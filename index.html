function compressImage(file, maxSide = 1280, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxSide) { height = Math.round((height * maxSide) / width); width = maxSide; }
        else if (height > maxSide) { width = Math.round((width * maxSide) / height); height = maxSide; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function PhotoSlot({ value, label, onChange }) {
  const ref = useRef(null);
  const [busy, setBusy] = useState(false);
  return (
    <button onClick={() => ref.current && ref.current.click()}
      className={`relative w-full aspect-square rounded-xl border-2 border-dashed flex flex-col items-center justify-center overflow-hidden ${
        value ? "border-emerald-400" : "border-slate-200 active:bg-slate-50"}`}>
      {busy ? (<span className="text-[10px] text-slate-400">İşleniyor...</span>)
        : value ? (<img src={value} alt={label} className="absolute inset-0 w-full h-full object-cover" />)
        : (<><span className="text-2xl">📷</span><span className="text-[10px] text-slate-500 mt-1 px-1 text-center leading-tight">{label}</span></>)}
      <input ref={ref} type="file" accept="image/*" capture="environment" className="hidden"
        onChange={async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          setBusy(true);
          try { onChange(await compressImage(file)); }
          catch { onChange(URL.createObjectURL(file)); }
          finally { setBusy(false); }
        }} />
    </button>
  );
}

      "Bu sayfaya dönüp “Tekrar Dene”ye basın." ] };
  }
  if (/Android/i.test(ua)) {
    return { name: "Android", steps: [
      "Adres çubuğundaki kilit/ⓘ simgesine dokunun.",
      '"İzinler" veya "Konum" bölümüne girin.',
      "Konum iznini “İzin Ver” yapın.",
      "Bu sayfaya dönüp “Tekrar Dene”ye basın." ] };

  return { name: "Tarayıcı", steps: [

    '"Site izinleri" altında Konum’u bulun.',
    'Konum’u “İzin Ver” olarak ayarlayın.',
    "“Tekrar Dene”ye basın." ] };
}

function GeoCapture({ data, setVal }) {
  const [status, setStatus] = useState("idle");
  const [msg, setMsg] = useState("");
  const [showHelp, setShowHelp] = useState(false);

  const doCapture = () => {
    if (!navigator.geolocation) { setStatus("error"); setMsg("Cihaz konum desteklemiyor."); return; }
    setStatus("loading"); setMsg("Konum alınıyor...");
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const lat = +pos.coords.latitude.toFixed(6);
        const lon = +pos.coords.longitude.toFixed(6);
        setVal("lat", lat); setVal("lon", lon);
        setStatus("done"); setShowHelp(false); setMsg(`${lat}, ${lon}`);
        try {
          const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=tr`);
          const j = await r.json();
          const il = j.principalSubdivision || j.city || "";
          const ilce = j.locality || j.city || "";
          if (il || ilce) setVal("ilIlce", [il, ilce].filter(Boolean).join(" / "));
        } catch (e) {}
      },
      (err) => {
        if (err.code === 1) { setStatus("error"); setMsg("Konum izni kapalı."); setShowHelp(true); }
        else { setStatus("error"); setMsg("Konum alınamadı, tekrar deneyin."); }
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  };

  const capture = async () => {
    try {
      if (navigator.permissions && navigator.permissions.query) {
        const st = await navigator.permissions.query({ name: "geolocation" });
        if (st.state === "denied") {
          setStatus("error"); setMsg("Konum izni kapalı."); setShowHelp(true);
          st.onchange = () => { if (st.state === "granted" || st.state === "prompt") doCapture(); };
          return;
        }
      }
    } catch (e) {}
    doCapture();
  };

  const help = showHelp ? platformSteps() : null;

  return (
    <div>
      <button onClick={capture} disabled={status === "loading"}
        className={`w-full py-3 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition ${
          status === "done" ? "bg-emerald-500 text-white" : status === "error" ? "bg-rose-500 text-white" : "bg-slate-800 text-white active:bg-slate-700"}`}>
        <span className="text-lg">📍</span>
        {status === "loading" ? "Alınıyor..." : status === "done" ? "Konum Alındı" : "Konumumu Al"}
      </button>
      {(data.lat || msg) && (
        <p className={`mt-2 text-[11px] ${status === "error" ? "text-rose-600" : "text-slate-500"}`}>
          {status === "done" && data.lat ? `📌 ${data.lat}, ${data.lon}` : msg}
        </p>
      )}
      {showHelp && help && (
        <div className="fixed inset-0 z-50 bg-black/50 flex items-end sm:items-center justify-center p-4">
          <div className="bg-white rounded-2xl w-full max-w-sm p-5">
            <div className="flex items-start gap-3">
              <span className="text-2xl">📍</span>
              <div>
                <h3 className="text-base font-bold text-slate-800">Konum izni kapalı</h3>
                <p className="text-xs text-slate-500 mt-0.5">{help.name} için açma adımları:</p>
              </div>
            </div>
            <ol className="mt-4 space-y-2">
              {help.steps.map((s, i) => (
                <li key={i} className="flex gap-3 text-sm text-slate-700">
                  <span className="flex-none w-6 h-6 rounded-full bg-slate-800 text-white text-xs font-bold flex items-center justify-center">{i + 1}</span>
                  <span className="pt-0.5">{s}</span>
                </li>
              ))}
            </ol>
            <div className="mt-5 flex gap-2">
              <button onClick={() => setShowHelp(false)} className="px-4 py-3 rounded-xl bg-slate-100 text-slate-700 text-sm font-semibold">Kapat</button>
              <button onClick={capture} className="flex-1 py-3 rounded-xl bg-emerald-500 text-white text-sm font-bold active:bg-emerald-600">Tekrar Dene</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Field({ field, value, onChange }) {
  return (
    <div className="py-3">
      <label className="block text-sm font-medium text-slate-700 mb-2">{field.label}</label>
      {field.type === "toggle" && <Toggle value={value} onChange={onChange} />}
      {field.type === "segmented" && <Segmented value={value} options={field.options} onChange={onChange} />}
      {field.type === "chips" && <Chips value={value} options={field.options} onChange={onChange} />}
      {field.type === "stepper" && <Stepper value={value} min={field.min} max={field.max} onChange={onChange} />}
      {field.type === "select" && <RangeSelect value={value} options={field.options} onChange={onChange} />}
      {field.type === "rating3" && <Rating3 value={value} onChange={onChange} />}
      {field.type === "weight" && <Weight value={value} onChange={onChange} />}
      {field.type === "stars" && <Stars value={value} onChange={onChange} />}
      {field.type === "text" && <TextField value={value} placeholder={field.placeholder} onChange={onChange} />}
      {field.type === "note" && <NoteField value={value} placeholder={field.placeholder} onChange={onChange} />}
    </div>
  );
}

function MagazaDenetimApp() {
  const [data, setData] = useState({});
  const [open, setOpen] = useState("genel");
  const [done, setDone] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [submitErr, setSubmitErr] = useState("");

  const setVal = (key, val) => setData((d) => ({ ...d, [key]: val }));
  const isFilled = (v) => v !== undefined && v !== "" && v !== null && !(Array.isArray(v) && v.length === 0);

  const { total, filled } = useMemo(() => {
    let total = 0, filled = 0;
    SECTIONS.forEach((s) => s.fields.forEach((f) => {
      if (f.key.startsWith("f_") || f.type === "geo") return;
      total++; if (isFilled(data[f.key])) filled++;
    }));
    return { total, filled };
  }, [data]);

  const pct = Math.round((filled / total) * 100);

  const sectionProgress = (s) => {
    const fs = s.fields.filter((f) => !f.key.startsWith("f_") && f.type !== "geo");
    if (fs.length === 0) {
      const ph = s.fields.filter((f) => isFilled(data[f.key])).length;
      return { f: ph, t: s.fields.length };
    }
    return { f: fs.filter((f) => isFilled(data[f.key])).length, t: fs.length };
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `magaza-denetim-${(data.magazaAdi || "kayit").replace(/\s+/g, "-")}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const buildFull = () => {
    const out = {};
    SECTIONS.forEach((s) => s.fields.forEach((f) => {
      if (f.type === "geo" || f.key.startsWith("f_")) return;
      let v = data[f.key];
      if (Array.isArray(v)) v = v.join(", ");
      if (typeof v === "boolean") v = v ? "Var" : "Yok";
      out[f.label] = v === undefined || v === null ? "" : v;
    }));
    out["Enlem"] = data.lat || "";
    out["Boylam"] = data.lon || "";
    return out;
  };

  const submit = async () => {
    if (!SUBMIT_URL) { exportJSON(); setDone(true); return; }
    const payload = buildFull();
    const photos = [];
    SECTIONS.find((s) => s.id === "foto").fields.forEach((f) => {
      const v = data[f.key];
      if (typeof v === "string" && v.startsWith("data:")) photos.push({ name: `${f.label}.jpg`, b64: v.split(",")[1] });
    });
    setSubmitting(true); setSubmitErr("");
    try {
      const res = await fetch(SUBMIT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ token: TOKEN, data: payload, photos }),
      });
      const j = await res.json().catch(() => ({ ok: res.ok }));
      if (j.ok === false) throw new Error(j.error || "Sunucu hatası");
      setDone(true);
    } catch (e) {
      setSubmitErr("Gönderilemedi: " + e.message + ". Taslağı indirip tekrar deneyin.");
    } finally { setSubmitting(false); }
  };

  if (done) {
    return (
      <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-center">
        <div className="text-5xl mb-4">✅</div>
        <h2 className="text-xl font-bold text-slate-800">Denetim Kaydedildi</h2>
        <p className="text-slate-500 mt-1 text-sm">{data.magazaAdi || "Mağaza"} — %{pct} dolduruldu</p>
        <div className="flex gap-3 mt-6">
          <button onClick={() => { setData({}); setDone(false); setOpen("genel"); }} className="px-5 py-3 rounded-xl bg-emerald-500 text-white text-sm font-semibold">Yeni Ziyaret</button>
          <button onClick={() => setDone(false)} className="px-5 py-3 rounded-xl bg-white border border-slate-200 text-slate-700 text-sm font-semibold">Geri dön</button>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-slate-100">
      <header className="sticky top-0 z-10 bg-slate-900 text-white px-4 pt-4 pb-3 shadow-lg">
        <div className="flex items-center justify-between">
          <div>
            <h1 className="text-base font-bold leading-tight">Carrefour Ziyaret Checklist</h1>
            <p className="text-[11px] text-slate-400">Saha Denetim · Mobile-First</p>
          </div>
          <span className="text-2xl font-bold text-amber-400">%{pct}</span>
        </div>
        <div className="mt-2 h-2 bg-slate-700 rounded-full overflow-hidden">
          <div className="h-full bg-amber-400 transition-all" style={{ width: `${pct}%` }} />
        </div>
      </header>

      <main className="max-w-md mx-auto px-3 py-4 pb-28 space-y-2">
        {SECTIONS.map((s) => {
          const sp = sectionProgress(s);
          const isOpen = open === s.id;
          return (
            <section key={s.id} className="bg-white rounded-2xl shadow-sm overflow-hidden">
              <button onClick={() => setOpen(isOpen ? "" : s.id)} className="w-full flex items-center justify-between px-4 py-4 active:bg-slate-50">
                <span className="flex items-center gap-3">
                  <span className="text-xl">{s.icon}</span>
                  <span className="text-left">
                    <span className="block text-sm font-bold text-slate-800">{s.title}</span>
                    <span className="block text-[11px] text-slate-400">{sp.f}/{sp.t} tamamlandı</span>
                  </span>
                </span>
                <span className="flex items-center gap-2">
                  {sp.f === sp.t && sp.t > 0 && <span className="text-emerald-500 text-lg">✓</span>}
                  <span className={`text-slate-400 transition-transform ${isOpen ? "rotate-180" : ""}`}>▾</span>
                </span>
              </button>
              {isOpen && (
                <div className="px-4 pb-4 border-t border-slate-100">
                  {s.note && <p className="text-[11px] text-amber-700 bg-amber-50 rounded-lg px-3 py-2 mt-3">{s.note}</p>}
                  {s.id === "foto" ? (
                    <div className="grid grid-cols-3 gap-2 mt-3">
                      {s.fields.map((f) => (<PhotoSlot key={f.key} value={data[f.key]} label={f.label} onChange={(v) => setVal(f.key, v)} />))}
                    </div>
                  ) : (
                    <div className="divide-y divide-slate-50">
                      {s.fields.map((f) => f.type === "geo" ? (
                        <div key={f.key} className="py-3">
                          <label className="block text-sm font-medium text-slate-700 mb-2">{f.label}</label>
                          <GeoCapture data={data} setVal={setVal} />
                        </div>
                      ) : (
                        <Field key={f.key} field={f} value={data[f.key]} onChange={(v) => setVal(f.key, v)} />
                      ))}
                    </div>
                  )}
                </div>
              )}
            </section>
          );
        })}
      </main>

      <div className="fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 max-w-md mx-auto">
        {submitErr && (<p className="text-[11px] text-rose-600 bg-rose-50 px-4 py-2">{submitErr}</p>)}
        <div className="px-4 py-3 flex gap-3">
          <button onClick={exportJSON} disabled={submitting} className="px-4 py-3 rounded-xl bg-slate-100 text-slate-700 text-sm font-semibold disabled:opacity-50">Taslak</button>
          <button onClick={submit} disabled={submitting} className="flex-1 py-3 rounded-xl bg-emerald-500 text-white text-sm font-bold active:bg-emerald-600 disabled:opacity-60">
            {submitting ? "Gönderiliyor..." : "Denetimi Gönder"}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MagazaDenetimApp />);
  </script>
</body>
</html>
